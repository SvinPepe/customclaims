modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/SvinPepe/customclaims/issues"
showAsResourcePack=false

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Uses Custom Claims Core territory services and can cooperate with Custom Claims War contested chunks."
description='''
${mod_description}

First-pass MVP features:
- limited foreign block interactions with runtime reset commands
- OPC protection bypass for allowed foreign and contested interactions
- CustomClaims explosion block filtering with party status/toggle commands and best-effort OPC sync
- side Create-machine rules shared by commands, GUI, and the open-GUI keybind
- claimrules toggle cooldown for explosion and Create side settings
- storage opening/breaking rules
- Wither blocking in configured dimensions
- basic villager and wandering trader damage protection
- /claimrules limits, reset, resetall, explosions, create, and gui commands
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_core"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_war"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"
