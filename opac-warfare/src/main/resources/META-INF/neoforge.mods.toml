modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/SvinPepe/customclaims/issues"
showAsResourcePack=false

[[mixins]]
config="customclaims_create.mixins.json"

[[mixins]]
config="customclaims_big_cannons.mixins.json"

[[mods]]
modId="customclaims_core"
version="${mod_version}"
displayName="OPaC Warfare - Core"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Built for NeoForge servers that use Open Parties and Claims as the source of party and personal claim ownership."
description='''
Core services for the unofficial Open Parties and Claims: Warfare addon.
'''

[[mods]]
modId="customclaims_war"
version="${mod_version}"
displayName="OPaC Warfare - War"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Depends on OPaC Warfare - Core for territory side ownership abstractions."
description='''
Chunk wars, contested claims, raid windows, capture progress, and war commands for Open Parties and Claims.
'''

[[mods]]
modId="customclaims_protection"
version="${mod_version}"
displayName="OPaC Warfare - Protection"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Uses OPaC Warfare - Core territory services and can cooperate with OPaC Warfare - War contested chunks."
description='''
Claim protection rules for explosions, storage, Withers, villagers, and foreign interactions.
'''

[[mods]]
modId="customclaims_create"
version="${mod_version}"
displayName="OPaC Warfare - Create Compat"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Integrates OPaC Warfare claim rules with Create contraption movement and block-breaking."
description='''
Create compat for contraption movement and block-breaking protection in claimed territories.
'''

[[mods]]
modId="customclaims_big_cannons"
version="${mod_version}"
displayName="OPaC Warfare - Big Cannons Compat"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Integrates OPaC Warfare protection rules with Create Big Cannons terrain damage and projectile launch."
description='''
Create Big Cannons compat for protected-claim launches and terrain damage rules.
'''

[[mods]]
modId="customclaims_xaero"
version="${mod_version}"
displayName="OPaC Warfare - Xaero Compat"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Fair-play temporary war waypoint sync compatible with Xaero minimap/worldmap clients."
description='''
Fair-play Xaero temporary waypoint sync for active Open Parties and Claims: Warfare conflicts.
'''

