modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/SvinPepe/customclaims/issues"
showAsResourcePack=false

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Depends on Custom Claims Core for territory side ownership abstractions."
description='''
${mod_description}

First-pass MVP features:
- /war start, /war status, /war list, and /war near
- /waradmin stop, skipprep, and setprogress by current/chosen chunk
- party-vs-party, party-vs-solo, and solo-vs-solo war sides
- preparation and active war phases
- contested chunk state with temporary OPC fake-owner transfer
- capture progress ticking, milestones, bossbar, and actionbar
- personal war lives with vanilla sidebar scoreboard display
- participant notifications for declaration, start, progress, and end
- raid window checks
- basic AFK tracking
- active war persistence after restart

The module is server-side first and delegates side ownership to Custom Claims Core.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_core"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"
