modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/SvinPepe/customclaims/issues"
showAsResourcePack=false

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Built for NeoForge servers that use Open Parties and Claims as the source of party and personal claim ownership."
description='''
${mod_description}

This module owns the shared server-side foundation:
- adapter interfaces for Open Parties and Claims
- Open Parties and Claims party, personal claim, and side integration
- party, player-side, claim, chunk, and territory models
- shared permission, message, config, storage, log, and rollback service contracts

Other Custom Claims modules should depend on this module instead of calling external claim APIs directly.
'''

[[dependencies.customclaims_core]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.customclaims_core]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.customclaims_core]]
modId="openpartiesandclaims"
type="required"
versionRange="[0.27.5,)"
ordering="AFTER"
side="BOTH"
