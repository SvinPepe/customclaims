modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/customclaims/customclaims/issues"
showAsResourcePack=false

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/customclaims/customclaims"
authors="${mod_authors}"
credits="Integrates CustomClaims protection rules with Create Big Cannons terrain damage and projectile launch."
description='''
${mod_description}

When Create Big Cannons is loaded, this module:
- cancels CBC terrain damage in CustomClaims protected chunks
- cancels CBC projectile spawns from protected claimed chunks
- follows /claimrules explosions enable|disable

When Create Big Cannons is absent, this module starts without active integration.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_core"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_protection"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_war"
type="optional"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create"
type="optional"
versionRange="[6.0.9,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="createbigcannons"
type="optional"
versionRange="[5.11.7,)"
ordering="AFTER"
side="BOTH"
