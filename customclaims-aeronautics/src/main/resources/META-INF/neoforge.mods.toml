modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/SvinPepe/customclaims/issues"
showAsResourcePack=false

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Integrates CustomClaims claim rules with Aeronautics/Offroad bore mining."
description='''
${mod_description}

When Offroad is loaded through Aeronautics, this module:
- blocks Borehead Bearing and Rock Cutting Wheel mining in protected claims
- follows /claimrules create enable|disable

When Aeronautics/Offroad is absent, this module starts without active integration.
'''

[[mixins]]
config="customclaims_aeronautics.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_core"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_protection"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create"
type="optional"
versionRange="[6.0.9,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="aeronautics"
type="optional"
versionRange="[1.3.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="offroad"
type="optional"
versionRange="[1.3.0,)"
ordering="AFTER"
side="BOTH"