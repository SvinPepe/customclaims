name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: opac-warfare-jars
          path: |
            customclaims-core/build/libs/*.jar
            customclaims-war/build/libs/*.jar
            customclaims-protection/build/libs/*.jar
            customclaims-create/build/libs/*.jar
            customclaims-big-cannons/build/libs/*.jar
            customclaims-xaero/build/libs/*.jar