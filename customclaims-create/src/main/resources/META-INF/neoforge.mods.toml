modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/customclaims/customclaims/issues"
showAsResourcePack=false

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/customclaims/customclaims"
authors="${mod_authors}"
credits="Integrates CustomClaims claim rules with Create contraption movement and block-breaking."
description='''
${mod_description}

When Create is loaded, this module:
- blocks drills, saws, and other BlockBreakingMovementBehaviour machines in protected claims
- blocks contraptions from assembling or moving protected claimed blocks
- follows /claimrules create enable|disable

When Create is absent, this module starts without active integration.
'''

[[mixins]]
config="customclaims_create.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_core"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_protection"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create"
type="optional"
versionRange="[6.0.9,)"
ordering="AFTER"
side="BOTH"
