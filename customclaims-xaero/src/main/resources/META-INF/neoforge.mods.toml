modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/SvinPepe/customclaims/issues"
showAsResourcePack=false

[[mixins]]
config="customclaims_xaero.mixins.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/SvinPepe/customclaims"
authors="${mod_authors}"
credits="Fair-play temporary war waypoint sync compatible with Xaero minimap/worldmap clients."
description='''
${mod_description}

Creates named temporary Xaero war waypoints from server-visible active/preparing war markers.
The legacy CustomClaims HUD overlay is disabled by default and can be re-enabled in config.
No global claim-owner map data is sent.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_core"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="customclaims_war"
type="required"
versionRange="[${mod_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="xaerominimap"
type="optional"
versionRange="[0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="xaeroworldmap"
type="optional"
versionRange="[0,)"
ordering="AFTER"
side="CLIENT"
